<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MINTORAIN">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <clipPath id="r">
      <rect x="0" y="0" width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <g clip-path="url(#r)">
    <rect width="64" height="64" fill="url(#bg)"/>

    <!-- 좌측 Leader 패인 (흰색) -->
    <rect x="8" y="8" width="26" height="48" rx="3" fill="#FFFFFF" fill-opacity="0.92"/>

    <!-- 우측 4분할 (Planner / Frontend / Backend / QA) -->
    <rect x="38" y="8"  width="18" height="10" rx="2" fill="#FDE047" fill-opacity="0.92"/>
    <rect x="38" y="20" width="18" height="10" rx="2" fill="#4ADE80" fill-opacity="0.92"/>
    <rect x="38" y="32" width="18" height="10" rx="2" fill="#38BDF8" fill-opacity="0.92"/>
    <rect x="38" y="44" width="18" height="10" rx="2" fill="#F87171" fill-opacity="0.92"/>
  </g>
</svg>
